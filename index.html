<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My PFC Balance Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;--text:#e8e6e3;--text-dim:#7f8c8dh;--accent:#00d2ff;--accent2:#7b61ff;--accent-glow:rgba(0,210,255,0.15);--green:#00e676;--orange:#ff9100;--pink:#ff4081;--radius:16px;--radius-sm:10px}
html{font-size:16px}body{font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(0,210,255,0.04),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(123,97,255,0.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 16px 60px}
.header{text-align:center;margin-bottom:32px;padding-top:20px}.header h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header p{font-size:0.82rem;color:var(--text-dim);margin-top:4px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}.card-title{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:8px}.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.input-group{margin-bottom:16px}.input-label{display:block;font-size:0.78rem;color:var(--text-dim);margin-bottom:6px}.input-row{display:flex;gap:10px}.input-row .input-group{flex:1}.input-field{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:1rem;font-weight:500;outline:none;transition:all 0.25s ease;-webkit-appearance:none}.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.input-field::placeholder{color:#444;font-weight:300}.unit{font-size:0.72rem;color:var(--text-dim);margin-top:3px}
.calc-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 24px rgba(0,210,255,0.25);margin-top:8px}.calc-btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,210,255,0.35)}
.results{display:none;animation:fadeUp 0.5s ease both}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.result-hero{text-align:center;padding:28px 20px;background:linear-gradient(135deg,rgba(0,210,255,0.08),rgba(123,97,255,0.08));border:1px solid rgba(0,210,255,0.15);border-radius:var(--radius);margin-bottom:16px}.result-hero .label{font-size:0.72rem;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:0.1em}.result-hero .value{font-size:2.8rem;font-weight:700;letter-spacing:-0.03em;margin-top:4px;line-height:1}.result-hero .value span{font-size:1rem;font-weight:400;color:var(--text-dim)}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.macro-card{text-align:center;padding:20px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);position:relative;overflow:hidden}.macro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}.macro-card.protein::before{background:linear-gradient(90deg,var(--accent),#00b4d8)}.macro-card.fat::before{background:linear-gradient(90deg,var(--orange),#ffab40)}.macro-card.carb::before{background:linear-gradient(90deg,var(--accent2),#b388ff)}.macro-card .macro-label{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em}.macro-card .macro-value{font-size:1.6rem;font-weight:700;margin-top:6px}.macro-card .macro-value span{font-size:0.8rem;font-weight:400;color:var(--text-dim)}.macro-card.protein .macro-value{color:var(--accent)}.macro-card.fat .macro-value{color:var(--orange)}.macro-card.carb .macro-value{color:var(--accent2)}
.pace-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px;font-size:0.85rem}.pace-bar .pace-val{font-weight:600;color:var(--green)}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.82rem}.detail-row:last-child{border-bottom:none}.detail-row .dl{color:var(--text-dim)}.detail-row .dv{font-weight:500}
.advice{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px}.advice-title{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--orange);margin-bottom:14px;display:flex;align-items:center;gap:8px}.advice-title::before{content:'';display:inline-block;width:3px;height:14px;background:linear-gradient(180deg,var(--orange),var(--pink));border-radius:2px}
.advice-block{margin-bottom:16px}.advice-block h4{font-size:0.82rem;font-weight:600;margin-bottom:8px}.advice-block p,.advice-block li{font-size:0.78rem;color:var(--text-dim);line-height:1.7;font-weight:300}.advice-block ul{list-style:none;padding:0}.advice-block li{padding:3px 0;padding-left:18px;position:relative}.advice-block li::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.5}
.walking-block{margin-top:14px;padding:14px;background:rgba(0,230,118,0.06);border:1px solid rgba(0,230,118,0.12);border-radius:var(--radius-sm)}.walking-block p{font-size:0.78rem;color:var(--text-dim);line-height:1.7;font-weight:300}.walking-highlight{color:var(--green)!important;font-weight:500!important}
.footer{text-align:center;margin-top:32px;font-size:0.68rem;color:#444;font-weight:300}
</style></head><body>
<div class="app">
<div class="header"><h1>My PFC Calculator</h1><p>パーソナル減量サポート</p></div>
<div class="card"><div class="card-title">測定データ入力</div>
<div class="input-group"><label class="input-label">体重</label><input type="number" class="input-field" id="weight" placeholder="56.0" step="0.1"><div class="unit">kg</div></div>
<div class="input-row"><div class="input-group"><label class="input-label">首回り</label><input type="number" class="input-field" id="neck" placeholder="34.5" step="0.1" value="34.5"><div class="unit">cm</div></div>
<div class="input-group"><label class="input-label">ウエスト（へそ周り）</label><input type="number" class="input-field" id="waist" placeholder="78.0" step="0.1"><div class="unit">cm</div></div></div>
<div class="input-group"><label class="input-label">ヒップ</label><input type="number" class="input-field" id="hip" placeholder="94.0" step="0.1"><div class="unit">cm</div></div>
<button class="calc-btn" onclick="calculate()">計算する</button></div>
<div class="results" id="results">
